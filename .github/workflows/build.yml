name: "Build PitchKernel for Malachite"

env:
  CONFIGURATION: "repos.json"
  OUT_DIR: "out"

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Create GitHub Release'
        required: false
        default: 'false'
        type: boolean

jobs:
  Set-repos:
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v4

      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          cat ${{ env.CONFIGURATION }} >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-latest
    needs:
      - Set-repos
    strategy:
      max-parallel: 2
      fail-fast: false
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      kernelDir: ${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}
      kernelName: ${{ matrix.repos.kernelSource.name }}
      kernelRepo: ${{ matrix.repos.kernelSource.repo }}
      kernelBranch: ${{ matrix.repos.kernelSource.branch }}
      kernelDevice: ${{ matrix.repos.kernelSource.device }}
      DEFCONFIG_NAME: ${{ matrix.repos.kernelSource.defconfig }}
      withKernelSU: ${{ matrix.repos.withKernelSU }}
      withSUSFS: ${{ matrix.repos.withSUSFS }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v4
        # Brings in vendor/luminaire/ (this repo's own copy of the
        # vendored KernelSU-Next+SUSFS scripts) so later steps can call
        # vendor/luminaire/kernel/apply_ksu_susfs.sh

      - name: "✨ Create working dir"
        run: mkdir -p $kernelDir

      - name: "⭐ Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip ftp gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev lftp zstd wget libfl-dev python3 libarchive-tools cpio

      - name: "🌟 Clone kernel source"
        working-directory: ./${{ env.kernelDir }}
        run: |
          git clone --recursive --branch $kernelBranch $kernelRepo $kernelName --depth=1

      - name: "💫 Get toolchains"
        working-directory: ./${{ env.kernelDir }}
        env:
          toolchains: "${{ toJSON(matrix.repos.toolchains) }}"
        run: |
          toolchains_num="$(echo $toolchains | jq 'length')"
          for ((i=0;i<toolchains_num;i++)); do
            repo="$(echo $toolchains | jq -r ".[$i].repo")"
            branch="$(echo $toolchains | jq -r ".[$i].branch")"
            name="$(echo $toolchains | jq -r ".[$i].name")"
            binPath="$(echo $toolchains | jq -r ".[$i].binPath | @tsv")"
            
            git clone --recursive --branch $branch --depth=1 $repo $name
            
            # Add bin paths to PATH
            IFS=$'\t' read -ra paths <<< "$binPath"
            for path in "${paths[@]}"; do
              echo "$(pwd)/$name/$path" >> $GITHUB_PATH
            done
          done

      - name: "😎 Set build args"
        id: generate-args
        working-directory: ./${{ env.kernelDir }}
        env:
          params: "${{ toJSON(matrix.repos.params) }}"
        run: |
          ARCH=$(echo $params | jq -r ".ARCH")
          CC=$(echo $params | jq -r ".CC")
          
          echo "ARCH=$ARCH" >> $GITHUB_ENV
          
          args="-j$(nproc --all)"
          if [ -n "${{ env.OUT_DIR }}" ]; then
            mkdir -p $(pwd)/${{ env.OUT_DIR }}
            args="$args O=$(pwd)/${{ env.OUT_DIR }}"
          fi
          if [ -n "$ARCH" ]; then
            args="$args ARCH=$ARCH"
          fi
          
          # Parse externalCommand for additional params
          externalCommand=$(echo $params | jq -r ".externalCommand // empty")
          if [ -n "$externalCommand" ] && [ "$externalCommand" != "null" ]; then
            keys=$(echo $externalCommand | jq -r 'keys[]')
            for key in $keys; do
              val=$(echo $externalCommand | jq -r ".[\"$key\"]")
              if [ -n "$val" ] && [ "$val" != "null" ]; then
                args="$args $key=$val"
              fi
            done
          fi
          
          echo "args=$args" >> $GITHUB_OUTPUT

      - name: "🍀 Apply KernelSU-Next + SUSFS"
        if: ${{ env.withKernelSU == 'true' && env.withSUSFS == 'true' }}
        run: |
          # Uses vendored scripts from LuminaireProtocol
          # (kernel/android14-6.1-lts/ksu/{ksunext,susfs}/), not hand-rolled
          # logic — mainline KernelSU-Next's dev branch doesn't have the
          # hook API SUSFS patches against, so this pulls pershoot's
          # dev-susfs fork instead, pinned to the exact commits Luminaire's
          # own checkpoint system verified as working
          # (see vendor/luminaire/kernel/android14-6.1-lts/manifest.json).
          bash "${{ github.workspace }}/vendor/luminaire/kernel/apply_ksu_susfs.sh" \
            "${{ github.workspace }}/${{ env.kernelDir }}/${{ env.kernelName }}"

      - name: "👍 Make defconfig"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        env:
          args: ${{ steps.generate-args.outputs.args }}
        run: |
          make ${{ env.args }} ${{ env.DEFCONFIG_NAME }}

      - name: "🎶 Build kernel"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        env:
          args: ${{ steps.generate-args.outputs.args }}
        run: |
          make ${{ env.args }}

      - name: "📦 Setup AnyKernel3"
        if: ${{ matrix.repos.AnyKernel3.use == true }}
        working-directory: ./${{ env.kernelDir }}
        env:
          AK3_REPO: ${{ matrix.repos.AnyKernel3.repo }}
          AK3_BRANCH: ${{ matrix.repos.AnyKernel3.branch }}
        run: |
          git clone --branch $AK3_BRANCH --depth=1 $AK3_REPO AnyKernel3
          
          # Copy kernel image to AnyKernel3
          cp ${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/Image* AnyKernel3/ 2>/dev/null || true
          cp ${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/dtb* AnyKernel3/ 2>/dev/null || true
          cp ${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/dtbo.img AnyKernel3/ 2>/dev/null || true
          
          # Copy modules if any
          if [ -d "${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/modules" ]; then
            cp -r ${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/modules/* AnyKernel3/modules/ 2>/dev/null || true
          fi

      - name: "🗜️ Pack AnyKernel3 zip"
        if: ${{ matrix.repos.AnyKernel3.use == true }}
        working-directory: ./${{ env.kernelDir }}/AnyKernel3
        run: |
          zip -r9 ../PitchKernel-Malachite-$(date +%Y%m%d).zip * -x .git README.md *placeholder

      - name: "💛 Upload Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: PitchKernel-${{ env.kernelDevice }}-${{ github.run_number }}
          path: |
            ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/Image*
            ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/dtb*
            ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/dtbo.img
            ./${{ env.kernelDir }}/PitchKernel-Malachite-*.zip
          if-no-files-found: ignore
          retention-days: 7

      - name: "🚀 Create GitHub Release"
        if: ${{ inputs.release == true && matrix.repos.AnyKernel3.release == true }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: PitchKernel-Malachite-v${{ github.run_number }}
          name: "PitchKernel for Malachite #${{ github.run_number }}"
          body: |
            PitchKernel build for Redmi Note 14 Pro 5G / POCO X7 5G (Malachite)
            - Android 14 (GKI 6.1)
            - KernelSU: ${{ env.withKernelSU }}
            - SUSFS: ${{ env.withSUSFS }}
          files: |
            ./${{ env.kernelDir }}/PitchKernel-Malachite-*.zip
            
